appId: studio.storyboardref.app
productName: Storyboard Reference Studio
directories:
  output: release
files:
  - out/**
  - package.json
  # ffmpeg-static is external to the main bundle — ship the real package
  # (the binary is what makes frame extraction and exports work on machines
  # without ffmpeg).
  - node_modules/ffmpeg-static/**
asarUnpack:
  - node_modules/ffmpeg-static/**
mac:
  category: public.app-category.video
  # No custom icon yet (Sam's logo is pending) — the default Electron icon is
  # used. Drop a build/icon.icns in and add `icon: build/icon.icns` to brand it.
  target:
    - target: dmg
      arch: [arm64]
  # Unsigned by default. For distribution beyond your own machines, set
  # identity + notarize (Apple Developer ID).
  identity: null
win:
  target: nsis
linux:
  target: AppImage
  category: Video
npmRebuild: false
